<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darius Shojaei — Senior UX Designer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pol%C5%82tawski+Nowy:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Work+Sans:wght@400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #ffffff;
      --text:     #1a1a1a;
      --text-2:   #555555;
      --text-3:   #888888;
      --border:   #e0e0e0;
      --surface:  #f7f7f7;
      --font-serif: 'Półtawski Nowy', Georgia, serif;
      --font-sans:  'Inter', -apple-system, sans-serif;
      --font-nav:   'Work Sans', sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .logo {
      font-family: var(--font-nav);
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
      position: absolute;
      top: 24px;
      left: 32px;
    }

    .container {
      text-align: center;
      max-width: 520px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .role {
      font-size: 15px;
      color: var(--text-3);
      font-weight: 400;
      margin-bottom: 40px;
    }

    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      margin-bottom: 48px;
    }

    .case-studies {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .case-study-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }

    .case-study-link:hover {
      border-color: var(--text);
      background: #fff;
    }

    .case-study-link .name {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .case-study-link .desc {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
    }

    .case-study-link .arrow {
      font-size: 18px;
      color: var(--text-3);
      transition: transform 0.2s;
    }

    .case-study-link:hover .arrow {
      transform: translateX(4px);
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 10px;
      vertical-align: middle;
    }

    .tag--nda {
      background: var(--text);
      color: #fff;
    }

    .tag--wip {
      background: var(--border);
      color: var(--text-2);
    }

    footer {
      position: absolute;
      bottom: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-3);
    }

    @media (max-width: 600px) {
      .logo {
        position: static;
        margin-bottom: 48px;
      }
      body {
        justify-content: flex-start;
        padding-top: 24px;
      }
      footer {
        position: static;
        margin-top: 48px;
      }
    }
  </style>
</head>

<body>

  <a href="/" class="logo">Darius.design</a>

  <div class="container">
    <h1>Darius Shojaei</h1>
    <p class="role">Senior UX Designer</p>

    <div class="status">Portfolio Under Construction</div>

    <div class="case-studies">
      <a href="case-studies/s-collective/" class="case-study-link">
        <div>
          <div class="name">S Collective <span class="tag tag--wip">In Progress</span></div>
          <div class="desc">Brand strategy & CRO for a fashion collective</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
      <a href="case-studies/waste-free/" class="case-study-link">
        <div>
          <div class="name">WasteFree <span class="tag tag--nda">NDA</span></div>
          <div class="desc">Zero-friction repurchase flow for a waste management app</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
    </div>
  </div>

  <footer>Available for new projects</footer>

</body>
</html>
